<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name - Profile</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-b3/css/all.min.css">
</head>
<body>

    <div class="profile-card">
        <img src="your-photo.jpg" alt="Your Profile Photo" class="profile-image">

        <h1 class="profile-name">Your Full Name</h1>

        <p class="profile-bio">
            A short, professional bio about yourself. Mention your key skills, current role, or a brief summary of your expertise and interests. Keep it concise and engaging.
        </p>

        <div class="social-links">
            <a href="#" class="social-icon" aria-label="LinkedIn Profile"><i class="fab fa-linkedin-in"></i></a>
            <a href="#" class="social-icon" aria-label="Twitter Profile"><i class="fab fa-twitter"></i></a>
            <a href="#" class="social-icon" aria-label="GitHub Profile"><i class="fab fa-github"></i></a>
            </div>
    </div>

</body>
</html>
